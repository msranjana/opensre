id: 313-github-issues-windows-crashes
title: Assistant checks GitHub issues for Windows crashes
intent_class: chat_handoff
input:
  prompt: can you check the github issues for the windows crashes?
session:
  has_prior_state: false
  configured_integrations: []
  resolved_integrations: {}
notes:
- 'No-integration handoff negative control: with no integrations connected, the planner
  must NOT dispatch a sourceless RCA, so it hands off and the assistant answers from
  text only -- no shell, no investigation. Gather tools must not fire. The dispatch
  counterpart (integrations connected) is 314 in complex_shell_prompts/.'
turn:
  expected_kind: agent
policy:
  executes_terminal_action: false
planned_actions: []
response_contract:
  must_contain_any:
  - GitHub
  - issues
  - Windows
  - crash
  must_not_contain:
  - $ /
  forbidden_actions:
  - shell
  - investigation
history:
  expected:
  - type: cli_agent
    ok: true
runs: 1
tool_actions:
- surface: gather
  tools:
  - search_sentry_issues
  - search_github_issues
  - list_posthog_tools
  expect: not_called
