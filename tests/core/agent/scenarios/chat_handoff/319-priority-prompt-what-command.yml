id: 319-priority-prompt-what-command
title: Priority prompt — what command do I use
intent_class: chat_handoff
input:
  prompt: what command do I use?
session:
  has_prior_state: false
  configured_integrations: []
  resolved_integrations: {}
notes:
- 'P0 priority prompt (misc_capability_question #1) from OpenSRE analytics priority-prompts report.'
- Prompt is sent verbatim; do not normalize typos or mixed language.
turn:
  expected_kind: agent
policy:
  executes_terminal_action: false
planned_actions:
- kind: assistant_handoff
  content: docs:command_selection
  source: llm
response_contract:
  must_contain_any:
  - command
  - investigate
  - opensre
  must_not_contain:
  - $ /
  - can't help
  - cannot help
  - I can't help
  - I cannot help
history:
  expected:
  - type: cli_agent
    ok: true
runs: 3
tool_actions:
- surface: gather
  tools:
  - search_sentry_issues
  - search_github_issues
  - list_posthog_tools
  expect: not_called
