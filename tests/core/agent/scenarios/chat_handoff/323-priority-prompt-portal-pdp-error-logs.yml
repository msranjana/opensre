id: 323-priority-prompt-portal-pdp-error-logs
title: Priority prompt — portal-pdp error logs 7 days
intent_class: chat_handoff
input:
  prompt: View the error logs of portal-pdp from the past 7 days.
session:
  has_prior_state: false
  configured_integrations: []
  resolved_integrations: {}
notes:
- 'P0 priority prompt (logs_metrics_traces_query #1) from OpenSRE analytics priority-prompts report.'
- Prompt is sent verbatim; do not normalize typos or mixed language.
turn:
  expected_kind: agent
policy:
  executes_terminal_action: false
planned_actions:
- kind: assistant_handoff
  content: logs_query:portal_pdp_error_logs_7d
  source: llm
response_contract:
  must_contain_any:
  - portal
  - log
  - error
  must_not_contain:
  - $ /
  - can't help
  - cannot help
  - I can't help
  - I cannot help
history:
  expected:
  - type: cli_agent
    ok: true
runs: 3
tool_actions:
- surface: gather
  tools:
  - search_sentry_issues
  - search_github_issues
  - list_posthog_tools
  expect: not_called
