id: 315-posthog-events-person-lookup-handoff
title: PostHog person-events lookup hands off and grounds the answer via PostHog (not an investigation)
intent_class: complex_shell_prompts
input:
  prompt: events for the person whose github_username is davincios in posthog mcp
session:
  has_prior_state: false
  configured_integrations:
  - posthog_mcp
  resolved_integrations:
    posthog_mcp:
      connection_verified: true
      mode: streamable-http
      url: https://mcp.posthog.com/mcp
      auth_token: fixture-token
notes:
- 'Data-retrieval / analytics lookup, NOT an investigation. The prompt asks to fetch events for a named
  person in PostHog -- it names no failure, crash, error, outage, or incident to root-cause. The planner
  must NOT emit investigation_start (regression guard for the DATA-RETRIEVAL rule in the action-planner
  prompt): it hands off and the conversational gather loop queries PostHog to ground the answer. Contrast
  with 314, where ''crashing on Windows'' names a failure and DOES dispatch an investigation.'
- Grounded against the live PostHog MCP (project 'Tracer Cloud Production', id 196678) on 2026-06-18.
  The person whose github_username is 'davincios' exists (person id bed2a68f-ce46-5d68-9835-537389f3e317,
  distinct_id fb70eccb-ba6d-46a3-b9ba-7cf67dbc9d9a, $lib opensre-cli). They carry two $identify events
  (17:05:49Z and 17:25:05Z) plus a rich history (~21 event types incl. terminal_turn_summarized,
  $ai_generation, cli_invoked), so this is a legitimate, reproducible lookup -- not a contrived prompt.
- 'Solidity contract: because PostHog is the only resolved integration, the gather loop MUST engage the
  PostHog tool surface on every run -- list_posthog_tools is asserted via must_call_all (strictly stronger
  than must_call_any), so a silently-dropped PostHog tool registration, a broken is_available check, or
  the planner wrongly starting an investigation instead of handing off all fail this scenario instead
  of passing on hallucinated text. call_posthog_tool is intentionally NOT required: it only fires after
  list_posthog_tools authenticates against the live endpoint, which the fake fixture token cannot do (it
  401s), so requiring it would make the fixture fail in every credential-less environment (CI included).
  list_posthog_tools firing is the deterministic, auth-independent proof that the gather loop selected this
  lookup to PostHog.'
turn:
  expected_kind: agent
policy:
  executes_terminal_action: false
planned_actions: []
response_contract:
  must_contain_any:
  - posthog
  - event
  - davincios
  must_not_contain:
  - $ /
  forbidden_actions:
  - investigation
  - shell
history:
  expected:
  - type: cli_agent
    ok: true
runs: 3
tool_actions:
- surface: gather
  tool: list_posthog_tools
  expect: called
