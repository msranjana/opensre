id: 316-sentry-recent-issues-windows-handoff
title: Sentry recent-issues lookup hands off and grounds the answer on valid live Sentry data
intent_class: complex_shell_prompts
input:
  prompt: can you query sentry if there are recent issues on windows?
session:
  has_prior_state: false
  configured_integrations:
  - sentry
  resolved_integrations:
    sentry: '@live'
notes:
- 'Data-retrieval / analytics lookup, NOT an investigation. The prompt asks to search Sentry for recent
  issues on Windows -- it names no failure, crash, error, outage, or incident to root-cause (it asks IF
  there ARE issues, not WHY something is failing). The planner must NOT emit investigation_start (regression
  guard for the DATA-RETRIEVAL rule in the action-planner prompt, whose own example is ''list the open
  sentry issues for checkout''): it hands off and the conversational gather loop queries Sentry to ground
  the answer. Contrast with 314, where ''crashing on Windows'' names a failure and DOES dispatch an investigation.'
- Reproduces a real interactive-shell turn ('can you query sentry if there are recent issue on windows?')
  that selected the gather loop and called search_sentry_issues. The earlier draft pinned a FAKE token,
  so the call 401'd yet still counted as 'called' (must_call_all) -- a hollow signal. This version resolves
  the REAL Sentry integration and asserts the tool returned VALID data via must_return_valid_data, so
  a credential 401, a malformed-param 400, a broken injected_params change, or the planner wrongly starting
  an investigation all fail instead of passing on hallucinated text.
- must_return_valid_data is satisfied by a successful, authenticated 200 response (available=true, no
  error) -- it does NOT require a non-empty issue list. A valid empty result ('no Windows issues in the
  window') still proves the integration path works end to end (resolution -> injected credentials -> live
  API -> parsed payload); the failure mode it catches is a broken/unauthenticated call, which is exactly
  the 401 the fake-token draft masked.
turn:
  expected_kind: agent
policy:
  executes_terminal_action: false
planned_actions: []
response_contract:
  must_contain_any:
  - sentry
  - issue
  - windows
  must_not_contain:
  - $ /
  forbidden_actions:
  - investigation
  - shell
history:
  expected:
  - type: cli_agent
    ok: true
runs: 3
tool_actions:
- surface: gather
  tool: search_sentry_issues
  expect: valid_data
