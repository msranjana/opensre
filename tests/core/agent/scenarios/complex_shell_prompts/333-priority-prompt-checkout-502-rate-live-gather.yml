id: 333-priority-prompt-checkout-502-rate-live-gather
title: Priority prompt — checkout 502 error rate (live Datadog gather)
intent_class: complex_shell_prompts
input:
  prompt: the checkout service is returning 502 errors for 30% of requests
session:
  has_prior_state: false
  configured_integrations:
  - datadog
  resolved_integrations:
    datadog: '@live'
notes:
- Live-gather counterpart to 325-priority-prompt-checkout-502-rate. Same prompt and handoff behavior, but
  asserts the conversational gather loop reaches live Datadog and returns valid data via query_datadog_logs
  or query_datadog_all (316-style), not merely that a tool was invoked despite auth/transport errors.
- 'P0 priority prompt (http_5xx_or_latency_after_deploy #1).'
turn:
  expected_kind: agent
policy:
  executes_terminal_action: false
planned_actions:
- kind: assistant_handoff
  content: incident_description:checkout_502_rate
  source: llm
response_contract:
  must_contain_any:
  - checkout
  - '502'
  must_not_contain:
  - $ /
  - can't help
  - cannot help
  - I can't help
  - I cannot help
  forbidden_actions:
  - investigation
history:
  expected:
  - type: cli_agent
    ok: true
runs: 3
tool_actions:
- surface: gather
  tools:
  - search_sentry_issues
  - search_github_issues
  - list_posthog_tools
  expect: not_called
- surface: gather
  tools:
  - query_datadog_logs
  - query_datadog_all
  expect: valid_data_any
