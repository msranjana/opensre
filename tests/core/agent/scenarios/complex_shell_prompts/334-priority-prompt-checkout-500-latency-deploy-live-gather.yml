id: 334-priority-prompt-checkout-500-latency-deploy-live-gather
title: Priority prompt — checkout 500s and latency after deploy (live gather)
intent_class: complex_shell_prompts
input:
  prompt: checkout-api has elevated 500s and latency after deploy
session:
  has_prior_state: false
  configured_integrations:
  - datadog
  resolved_integrations:
    datadog: '@live'
notes:
- Live-gather counterpart to 326-priority-prompt-checkout-500-latency-deploy.
- Asserts a live Datadog gather tool returns valid data (empty results OK).
- 'P0 priority prompt (http_5xx_or_latency_after_deploy #2).'
turn:
  expected_kind: agent
policy:
  executes_terminal_action: false
planned_actions:
- kind: assistant_handoff
  content: incident_description:checkout_500_latency_deploy
  source: llm
response_contract:
  must_contain_any:
  - checkout
  - '500'
  - latency
  - deploy
  must_not_contain:
  - $ /
  - can't help
  - cannot help
  - I can't help
  - I cannot help
  forbidden_actions:
  - investigation
history:
  expected:
  - type: cli_agent
    ok: true
runs: 3
tool_actions:
- surface: gather
  tools:
  - search_sentry_issues
  - search_github_issues
  - list_posthog_tools
  expect: not_called
- surface: gather
  tools:
  - query_datadog_logs
  - query_datadog_all
  expect: valid_data_any
