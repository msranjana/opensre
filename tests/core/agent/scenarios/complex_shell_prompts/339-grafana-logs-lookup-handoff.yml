id: 339-grafana-logs-lookup-handoff
title: Grafana logs lookup hands off and gather selects query_grafana_logs
intent_class: complex_shell_prompts
input:
  prompt: 'show me the most recent grafana logs for the payments service'
session:
  has_prior_state: false
  configured_integrations:
  - grafana
  resolved_integrations:
    grafana:
      connection_verified: true
      endpoint: https://grafana.example.com
      api_key: fixture-token
notes:
- 'Data-retrieval / analytics lookup against Grafana Loki, NOT an investigation. The prompt asks to SHOW
  recent logs for a named service -- it names no failure, crash, error, outage, or incident to root-cause --
  so per the DATA-RETRIEVAL rule the planner hands off and the conversational gather loop queries Grafana.
  This is the CONNECTED-Grafana counterpart to 324 (query_grafana_logs with NO integration connected, which
  can only hand off), upgrading that negative control into a positive gather assertion.'
- 'Selection guard: Grafana is the only resolved integration, so the gather loop MUST select a Grafana
  data-retrieval tool and MUST NOT touch Sentry/GitHub/PostHog/Datadog. call_any accepts either
  query_grafana_logs or query_grafana_service_names because the live gather model may discover Loki labels
  before querying logs when the fixture endpoint is unreachable.'
- 'Auth-independent by design: the fixture Grafana config is shaped (connection_verified + endpoint) so the
  tool''s is_available check passes and the call fires, but the fake token cannot authenticate against a
  live Loki endpoint. "Was called" is therefore the credential-free proof that the gather loop selected
  Grafana for this lookup (same reasoning as list_posthog_tools in 315); requiring valid_data would make the
  fixture fail in every credential-less environment, including CI.'
turn:
  expected_kind: agent
policy:
  executes_terminal_action: false
planned_actions:
- kind: assistant_handoff
  content: logs_query:grafana_payments
  source: llm
response_contract:
  must_contain_any:
  - grafana
  - log
  - payments
  must_not_contain:
  - $ /
  - can't help
  - cannot help
  - I can't help
  - I cannot help
  forbidden_actions:
  - investigation
  - shell
history:
  expected:
  - type: cli_agent
    ok: true
runs: 3
tool_actions:
- surface: gather
  tools:
  - query_grafana_logs
  - query_grafana_service_names
  expect: call_any
- surface: gather
  tools:
  - search_sentry_issues
  - search_github_issues
  - list_posthog_tools
  - query_datadog_all
  expect: not_called
