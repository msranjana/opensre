id: 602-follow-up-what-happened
title: Follow-up what happened
intent_class: follow_up
input:
  prompt: what happened?
session:
  has_prior_state: true
  configured_integrations: []
  resolved_integrations: {}
notes: []
turn:
  expected_kind: agent
policy:
  executes_terminal_action: false
planned_actions:
- kind: assistant_handoff
  content: follow_up:last_investigation_summary
  source: llm
response_contract:
  must_contain_any:
  - root cause
  - investigation
  - happened
  must_not_contain:
  - $ /
history:
  expected:
  - type: cli_agent
    ok: true
runs: 3
tool_actions:
- surface: gather
  tools:
  - search_sentry_issues
  - search_github_issues
  - list_posthog_tools
  expect: not_called
