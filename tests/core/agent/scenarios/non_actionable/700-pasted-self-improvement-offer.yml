    both provider+model automatically instead of misclassifying the model as a provider.
session:
  has_prior_state: false
  configured_integrations: []
  resolved_integrations: {}
available_capabilities:
  slash_commands: []
  cli_commands: []
  llm_provider: []
notes:
- Prompt reads like the assistant offering a code change; nothing to execute.
turn:
  expected_kind: agent
policy:
  executes_terminal_action: false
planned_actions: []
response_contract:
  must_contain_any: []
  must_not_contain:
  - $ /
history:
